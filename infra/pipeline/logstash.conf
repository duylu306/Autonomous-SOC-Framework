input {
  file {
    path => "/zeek_logs/*.log"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    codec => "json"
    type => "zeek"
  }
  file {
    path => "/suricata_logs/eve.json"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    codec => "json"
    type => "suricata"
  }
  file {
    path => "/windows_logs/*.json"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    codec => "json"
    type => "sysmon"
  }
}

filter {
  ruby {
    code => '
      q = event.get("[dns][question][name]") || event.get("query")
      if q
        q_down = q.downcase
        parts = q_down.split(".")
        label = parts[0] || ""
        # entropy
        freq = Hash.new(0)
        label.each_byte { |b| freq[b] += 1 }
        ent = 0.0
        len = label.length.to_f
        if len > 0
          freq.each_value do |c|
            p = c / len
            ent -= p * Math.log2(p) if p > 0
          end
        end
        # base domain (last two labels)
        base = parts.length >= 2 ? "#{parts[-2]}.#{parts[-1]}" : q_down
        event.set("dns.question.label", label)
        event.set("dns.question.label_length", label.length)
        event.set("dns.question.entropy", ent.round(3))
        event.set("dns.question.base_domain", base)
      end
    '
  }
  if [type] == "zeek" {
    mutate {
      rename => {
        "id.orig_h" => "source_ip"
        "id.resp_h" => "destination_ip"
        "id.resp_p" => "destination_port"
        "proto"     => "network_transport"
        "query"     => "[dns][question][name]"
        "host"      => "http_host"
      }
    }
    # date { match => [ "ts", "UNIX", "ISO8601" ] target => "@timestamp" }  #turn on to filter actual time of the file else current pc time
  }

  if [type] == "suricata" and [event_type] == "alert" {
    translate {
      source => "src_ip"
      target => "[threat_intel][category]"
      dictionary_path => "/usr/share/logstash/ti_feed.yml"
      refresh_interval => 1000
      fallback => "SAFE"
    }
    if [threat_intel][category] != "SAFE" {
      mutate {
        add_tag => ["CRITICAL_THREAT_DETECTED","Enriched_by_Logstash"]
        replace => { "[alert][severity]" => "1" }
      }
    }
  }
}

output {
  if [type] == "zeek" {
    elasticsearch {
      hosts => ["https://elasticsearch:9200"]
      user => "elastic"
      password => "SoC_Admin_Password_123!"
      ssl_enabled => true
      ssl_certificate_authorities => "/usr/share/logstash/config/certs/ca/ca.crt"
      index => "zeek-data-%{+YYYY.MM.dd}"
      action => "index"
    }
  }

  else if [type] == "suricata" {
    elasticsearch {
      hosts => ["https://elasticsearch:9200"]
      user => "elastic"
      password => "SoC_Admin_Password_123!"
      ssl_enabled => true
      ssl_certificate_authorities => "/usr/share/logstash/config/certs/ca/ca.crt"
      index => "suricata-alerts-%{+YYYY.MM.dd}"
      action => "index"
    }
  }
  else if [type] == "sysmon" {
    elasticsearch {
      hosts => ["https://elasticsearch:9200"]
      user => "elastic"
      password => "SoC_Admin_Password_123!"
      ssl_enabled => true
      ssl_certificate_authorities => "/usr/share/logstash/config/certs/ca/ca.crt"
      index => "sysmon-data-%{+YYYY.MM.dd}"
      action => "index"
    }
  }
}
